<template name="window" content="content">
<head>
	<link type="text/css" href="html.css"/>
	<link type="text/css" href="invader.css"/>
</head>
<body class="window">
	<div id="title_bar">
		<handle move_target="#document">
			<div id="icon"></div>
			<span id="title">Title</span>
		</handle>
	</div>
	<div id="window">
		<div id="content">
		</div>
	</div>
	<handle size_target="#document" style="position: absolute; width: 16dp; height: 16dp; bottom: 0px; right: 0px; cursor: resize;"></handle>
</body>
</template>
